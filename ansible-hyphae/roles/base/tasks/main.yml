---
- name: Ensure apt cache is up to date
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
  become: true

- name: Configure sysctl to disable IPv6
  ansible.builtin.template:
    src: disable_ipv6.conf.j2
    dest: /etc/sysctl.d/99-disable-ipv6.conf
    owner: root
    group: root
    mode: "0644"
  register: disable_ipv6_sysctl
  when: base_disable_ipv6
  become: true

- name: Apply sysctl settings after IPv6 change
  ansible.builtin.command: sysctl --system
  register: disable_ipv6_sysctl_apply
  changed_when: disable_ipv6_sysctl.changed
  when: base_disable_ipv6
  become: true

- name: Validate IPv6 sysctl is disabled
  ansible.builtin.command: cat /proc/sys/net/ipv6/conf/all/disable_ipv6
  register: disable_ipv6_check
  changed_when: false
  failed_when: disable_ipv6_check.stdout.strip() != "1"
  when: base_disable_ipv6
  become: true

- name: Validate no global IPv6 addresses are present
  ansible.builtin.command: ip -6 addr show
  register: ipv6_addr_check
  changed_when: false
  failed_when: "'scope global' in ipv6_addr_check.stdout"
  when: base_disable_ipv6
  become: true

- name: Configure UFW default policies
  community.general.ufw:
    default: "{{ item.policy }}"
    direction: "{{ item.direction }}"
    state: enabled
  loop:
    - { direction: incoming, policy: "{{ base_ufw_default_incoming }}" }
    - { direction: outgoing, policy: "{{ base_ufw_default_outgoing }}" }
    - { direction: routed, policy: "{{ base_ufw_default_routed }}" }
  become: true

- name: Configure UFW logging
  community.general.ufw:
    logging: "{{ base_ufw_logging }}"
    state: enabled
  become: true

- name: Configure UFW IPv6 support
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^IPV6='
    line: "IPV6={{ 'yes' if base_ufw_ipv6 else 'no' }}"
    create: true
  register: ufw_ipv6_config
  become: true

- name: Reload UFW after IPv6 change
  community.general.ufw:
    state: reloaded
  when: ufw_ipv6_config.changed
  become: true

- name: Remove UFW TCP allow rules
  community.general.ufw:
    rule: allow
    proto: tcp
    port: "{{ item }}"
    delete: true
    state: enabled
  loop: "{{ base_ufw_delete_tcp_ports }}"
  when: base_ufw_delete_tcp_ports | length > 0
  become: true

- name: Allow UFW TCP service ports from sources
  community.general.ufw:
    rule: allow
    proto: tcp
    port: "{{ item.port }}"
    from_ip: "{{ item.from_ip }}"
    state: enabled
  loop: "{{ base_ufw_allow_tcp_from_rules }}"
  when: base_ufw_allow_tcp_from_rules | length > 0
  become: true

- name: Allow UFW TCP service ports
  community.general.ufw:
    rule: allow
    proto: tcp
    port: "{{ item }}"
    state: enabled
  loop: "{{ base_ufw_allow_tcp_ports }}"
  become: true

- name: Allow UFW UDP service ports
  community.general.ufw:
    rule: allow
    proto: udp
    port: "{{ item }}"
    state: enabled
  loop: "{{ base_ufw_allow_udp_ports }}"
  when: base_ufw_allow_udp_ports | length > 0
  become: true

- name: Allow UFW traffic on WireGuard interface
  community.general.ufw:
    rule: allow
    interface_in: "{{ base_wireguard_interface }}"
    state: enabled
  when: base_wireguard_enabled
  become: true

- name: Ensure UFW is enabled
  community.general.ufw:
    state: enabled
  when: base_ufw_enabled
  become: true

- name: Deploy managed sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -T -f %s"
  notify: Restart sshd
  become: true

- name: Ensure sudo group exists
  ansible.builtin.group:
    name: sudo
    state: present
  become: true

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  become: true

- name: Ensure docker service user exists
  ansible.builtin.user:
    name: "{{ base_docker_user }}"
    group: docker
    shell: /usr/sbin/nologin
    create_home: false
    system: true
  become: true

- name: Ensure primary user exists and in groups
  ansible.builtin.user:
    name: "{{ base_primary_user }}"
    uid: "{{ base_primary_user_uid }}"
    shell: "{{ base_primary_user_shell }}"
    groups:
      - sudo
      - docker
    append: true
    create_home: true
    state: present
  become: true

- name: Configure passwordless sudo for primary user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ base_primary_user }}"
    content: "{{ base_primary_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  become: true

- name: Ensure hostname is set
  ansible.builtin.hostname:
    name: "{{ base_hostname }}"
  become: true

- name: Ensure timezone is set
  community.general.timezone:
    name: "{{ base_timezone }}"
  become: true

- name: Configure memory settings
  ansible.builtin.import_tasks: memory.yml

- name: Ensure WireGuard configuration directory exists
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: base_wireguard_enabled
  become: true

- name: Generate WireGuard private key
  ansible.builtin.shell: "umask 077 && wg genkey > {{ base_wireguard_private_key_path }}"
  args:
    creates: "{{ base_wireguard_private_key_path }}"
  when: base_wireguard_enabled
  no_log: true
  become: true

- name: Read WireGuard private key
  ansible.builtin.command: "cat {{ base_wireguard_private_key_path }}"
  register: base_wireguard_private_key
  changed_when: false
  when: base_wireguard_enabled
  no_log: true
  become: true

- name: Compute WireGuard public key
  ansible.builtin.command: wg pubkey
  args:
    stdin: "{{ base_wireguard_private_key.stdout }}"
  register: base_wireguard_public_key
  changed_when: false
  when: base_wireguard_enabled
  become: true

- name: Write WireGuard public key file
  ansible.builtin.copy:
    content: "{{ base_wireguard_public_key.stdout }}\n"
    dest: "{{ base_wireguard_public_key_path }}"
    owner: root
    group: root
    mode: "0644"
  when: base_wireguard_enabled
  become: true


- name: Deploy WireGuard configuration
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "{{ base_wireguard_config_path }}"
    owner: root
    group: root
    mode: "0600"
    force: true
  vars:
    wireguard_private_key: "{{ base_wireguard_private_key.stdout }}"
    wireguard_public_key: "{{ base_wireguard_public_key.stdout }}"
  notify: Restart WireGuard
  when: base_wireguard_enabled
  no_log: true
  become: true

- name: Ensure WireGuard service is enabled and running
  ansible.builtin.systemd:
    name: "wg-quick@{{ base_wireguard_interface }}"
    enabled: true
    state: started
  when: base_wireguard_enabled
  become: true

- name: Ensure fishcity_root directory exists
  ansible.builtin.file:
    path: "{{ base_fishcity_root }}"
    state: directory
    owner: "{{ base_fishcity_owner }}"
    group: "{{ base_fishcity_group }}"
    mode: "0755"
  become: true

- name: Ensure fishcity log and config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ base_fishcity_owner }}"
    group: "{{ base_fishcity_group }}"
    mode: "0755"
  loop:
    - /var/log/fishcity
    - /etc/fishcity
  become: true

- name: Install logrotate policy for fishcity logs
  ansible.builtin.template:
    src: logrotate-fishcity.j2
    dest: /etc/logrotate.d/fishcity
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Ensure update-motd.d directory exists
  ansible.builtin.file:
    path: /etc/update-motd.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: base_motd_enabled | default(false)
  become: true

- name: Install hyphae status MOTD script
  ansible.builtin.template:
    src: 99-hyphae-status.j2
    dest: /etc/update-motd.d/99-hyphae-status
    owner: root
    group: root
    mode: "0755"
  when: base_motd_enabled | default(false)
  become: true

- name: Ensure chrony service enabled and running
  ansible.builtin.service:
    name: "{{ base_chrony_service }}"
    state: started
    enabled: true
  become: true
