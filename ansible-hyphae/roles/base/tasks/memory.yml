---
- name: Ensure swapfile exists
  ansible.builtin.command: "fallocate -l {{ hyphae_swapfile_size_mb }}M {{ hyphae_swapfile_path }}"
  args:
    creates: "{{ hyphae_swapfile_path }}"
  when:
    - hyphae_swapfile_path is defined
    - hyphae_swapfile_size_mb is defined
  become: true

- name: Check swapfile presence
  ansible.builtin.stat:
    path: "{{ hyphae_swapfile_path }}"
  register: hyphae_swapfile_stat
  when:
    - hyphae_swapfile_path is defined
    - hyphae_swapfile_size_mb is defined
  become: true

- name: Ensure swapfile permissions are correct
  ansible.builtin.file:
    path: "{{ hyphae_swapfile_path }}"
    owner: root
    group: root
    mode: "0600"
  when:
    - hyphae_swapfile_path is defined
    - hyphae_swapfile_size_mb is defined
    - hyphae_swapfile_stat.stat.exists
  become: true

- name: Check swapfile signature
  ansible.builtin.command: "blkid -o value -s TYPE {{ hyphae_swapfile_path }}"
  register: hyphae_swapfile_type
  changed_when: false
  failed_when: false
  when:
    - hyphae_swapfile_path is defined
    - hyphae_swapfile_size_mb is defined
    - hyphae_swapfile_stat.stat.exists
  become: true

- name: Initialize swapfile
  ansible.builtin.command: "mkswap {{ hyphae_swapfile_path }}"
  when:
    - hyphae_swapfile_path is defined
    - hyphae_swapfile_size_mb is defined
    - hyphae_swapfile_stat.stat.exists
    - hyphae_swapfile_type.stdout | trim != "swap"
  become: true

- name: Check if swapfile is active
  ansible.builtin.command: swapon --show --noheadings --raw
  register: hyphae_swapon
  changed_when: false
  when:
    - hyphae_swapfile_path is defined
    - hyphae_swapfile_size_mb is defined
    - hyphae_swapfile_stat.stat.exists
  become: true

- name: Enable swapfile
  ansible.builtin.command: "swapon {{ hyphae_swapfile_path }}"
  when:
    - hyphae_swapfile_path is defined
    - hyphae_swapfile_size_mb is defined
    - hyphae_swapfile_stat.stat.exists
    - hyphae_swapon.stdout is not search(hyphae_swapfile_path)
  become: true

- name: Ensure swapfile is present in fstab
  ansible.posix.mount:
    name: none
    src: "{{ hyphae_swapfile_path }}"
    fstype: swap
    opts: sw
    state: present
  when:
    - hyphae_swapfile_path is defined
    - hyphae_swapfile_size_mb is defined
    - hyphae_swapfile_stat.stat.exists
  become: true

- name: Install sysctl memory overrides
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-hyphae-memory.conf
    content: |
      vm.swappiness = {{ hyphae_vm_swappiness }}
      vm.overcommit_ratio = {{ hyphae_vm_overcommit_ratio }}
      vm.overcommit_memory = {{ hyphae_vm_overcommit_memory }}
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl
  when:
    - hyphae_vm_swappiness is defined
    - hyphae_vm_overcommit_ratio is defined
    - hyphae_vm_overcommit_memory is defined
  become: true
