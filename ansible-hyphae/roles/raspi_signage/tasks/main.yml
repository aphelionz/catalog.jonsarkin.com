---
- name: Ensure apt cache is up to date
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts.os_family == "Debian"
  become: true

- name: Ensure signage groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop: "{{ raspi_signage_user_groups }}"
  become: true

- name: Ensure signage user exists
  ansible.builtin.user:
    name: "{{ raspi_signage_user }}"
    shell: "{{ raspi_signage_user_shell }}"
    groups: "{{ raspi_signage_user_groups }}"
    append: true
    create_home: true
    state: present
  become: true

- name: Install base signage packages
  ansible.builtin.apt:
    name: "{{ raspi_signage_packages }}"
    state: present
  when: ansible_facts.os_family == "Debian"
  become: true

- name: Install lightdm when requested
  ansible.builtin.apt:
    name: "{{ raspi_signage_lightdm_packages }}"
    state: present
  when:
    - ansible_facts.os_family == "Debian"
    - raspi_signage_use_lightdm
  become: true

- name: Probe chromium package availability
  ansible.builtin.command: "apt-cache policy {{ item }}"
  loop: "{{ raspi_signage_chromium_packages }}"
  register: raspi_signage_chromium_candidates
  changed_when: false
  failed_when: false
  when: ansible_facts.os_family == "Debian"
  become: true

- name: Select available chromium package
  ansible.builtin.set_fact:
    raspi_signage_chromium_package: >-
      {{
        (raspi_signage_chromium_candidates.results
          | selectattr('stdout', 'search', 'Candidate:')
          | rejectattr('stdout', 'search', 'Candidate: \\(none\\)')
          | map(attribute='item')
          | list
          | first)
          | default('')
      }}
  when: ansible_facts.os_family == "Debian"

- name: Warn when no chromium package is available
  ansible.builtin.debug:
    msg: "No chromium package found in apt cache; set raspi_signage_chromium_packages or install Chromium manually."
  when:
    - ansible_facts.os_family == "Debian"
    - raspi_signage_chromium_package | length == 0

- name: Install chromium package
  ansible.builtin.apt:
    name: "{{ raspi_signage_chromium_package }}"
    state: present
  when:
    - ansible_facts.os_family == "Debian"
    - raspi_signage_chromium_package | length > 0
  become: true

- name: Check for chromium-browser binary
  ansible.builtin.stat:
    path: /usr/bin/chromium-browser
  register: raspi_signage_chromium_browser_bin

- name: Set chromium binary when not explicitly configured
  ansible.builtin.set_fact:
    raspi_signage_chromium_bin: "{{ 'chromium-browser' if raspi_signage_chromium_browser_bin.stat.exists else 'chromium' }}"
  when: raspi_signage_chromium_bin | length == 0

- name: Ensure openbox config directory exists (lightdm mode)
  ansible.builtin.file:
    path: "/home/{{ raspi_signage_user }}/.config/openbox"
    state: directory
    owner: "{{ raspi_signage_user }}"
    group: "{{ raspi_signage_user }}"
    mode: "0755"
  when: raspi_signage_use_lightdm
  become: true

- name: Configure openbox autostart (lightdm mode)
  ansible.builtin.template:
    src: openbox-autostart.j2
    dest: "/home/{{ raspi_signage_user }}/.config/openbox/autostart"
    owner: "{{ raspi_signage_user }}"
    group: "{{ raspi_signage_user }}"
    mode: "0755"
  when: raspi_signage_use_lightdm
  become: true

- name: Configure xinitrc (systemd mode)
  ansible.builtin.template:
    src: xinitrc.j2
    dest: "/home/{{ raspi_signage_user }}/.xinitrc"
    owner: "{{ raspi_signage_user }}"
    group: "{{ raspi_signage_user }}"
    mode: "0755"
  when: not raspi_signage_use_lightdm
  become: true

- name: Deploy signage systemd service (systemd mode)
  ansible.builtin.template:
    src: raspi-signage.service.j2
    dest: /etc/systemd/system/raspi-signage.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart raspi-signage
  when: not raspi_signage_use_lightdm
  become: true

- name: Enable and start signage service (systemd mode)
  ansible.builtin.systemd:
    name: raspi-signage.service
    enabled: true
    state: started
  when: not raspi_signage_use_lightdm
  become: true

- name: Install virtual display packages
  ansible.builtin.apt:
    name: "{{ raspi_signage_virtual_packages }}"
    state: present
  when:
    - ansible_facts.os_family == "Debian"
    - raspi_signage_virtual_enabled
  become: true

- name: Disable legacy x11vnc service when using virtual display
  ansible.builtin.systemd:
    name: x11vnc
    enabled: false
    state: stopped
  when: raspi_signage_virtual_enabled
  failed_when: false
  become: true

- name: Ensure virtual VNC password directory exists
  ansible.builtin.file:
    path: "{{ raspi_signage_virtual_vnc_password_file | dirname }}"
    state: directory
    owner: "{{ raspi_signage_user }}"
    group: "{{ raspi_signage_user }}"
    mode: "0700"
  when:
    - raspi_signage_virtual_enabled
    - raspi_signage_virtual_vnc_enabled
  become: true

- name: Ensure virtual Chromium profile directory exists
  ansible.builtin.file:
    path: "{{ raspi_signage_virtual_chromium_user_data_dir }}"
    state: directory
    owner: "{{ raspi_signage_user }}"
    group: "{{ raspi_signage_user }}"
    mode: "0700"
  when: raspi_signage_virtual_enabled
  become: true

- name: Set virtual VNC password
  ansible.builtin.command: "x11vnc -storepasswd {{ raspi_signage_virtual_vnc_password }} {{ raspi_signage_virtual_vnc_password_file }}"
  args:
    creates: "{{ raspi_signage_virtual_vnc_password_file }}"
  when:
    - raspi_signage_virtual_enabled
    - raspi_signage_virtual_vnc_enabled
    - raspi_signage_virtual_vnc_password | length > 0
  become: true
  become_user: "{{ raspi_signage_user }}"
  no_log: true

- name: Warn when virtual VNC password is not set
  ansible.builtin.debug:
    msg: "raspi_signage_virtual_vnc_password is empty; virtual VNC will not start until a password file exists."
  when:
    - raspi_signage_virtual_enabled
    - raspi_signage_virtual_vnc_enabled
    - raspi_signage_virtual_vnc_password | length == 0

- name: Check virtual VNC password file
  ansible.builtin.stat:
    path: "{{ raspi_signage_virtual_vnc_password_file }}"
  register: raspi_signage_virtual_vnc_password_stat
  when:
    - raspi_signage_virtual_enabled
    - raspi_signage_virtual_vnc_enabled
  become: true

- name: Install virtual signage session script
  ansible.builtin.template:
    src: raspi-signage-virtual-session.sh.j2
    dest: /usr/local/bin/raspi-signage-virtual-session
    owner: root
    group: root
    mode: "0755"
  when: raspi_signage_virtual_enabled
  notify: Restart raspi-signage-virtual
  become: true

- name: Install virtual signage systemd service
  ansible.builtin.template:
    src: raspi-signage-virtual.service.j2
    dest: /etc/systemd/system/raspi-signage-virtual.service
    owner: root
    group: root
    mode: "0644"
  when: raspi_signage_virtual_enabled
  notify:
    - Reload systemd
    - Restart raspi-signage-virtual
  become: true

- name: Enable and start virtual signage service
  ansible.builtin.systemd:
    name: raspi-signage-virtual.service
    enabled: true
    state: started
  when: raspi_signage_virtual_enabled
  become: true

- name: Install virtual VNC systemd service
  ansible.builtin.template:
    src: raspi-signage-virtual-vnc.service.j2
    dest: /etc/systemd/system/raspi-signage-virtual-vnc.service
    owner: root
    group: root
    mode: "0644"
  when:
    - raspi_signage_virtual_enabled
    - raspi_signage_virtual_vnc_enabled
  notify:
    - Reload systemd
    - Restart raspi-signage-virtual-vnc
  become: true

- name: Enable and start virtual VNC service
  ansible.builtin.systemd:
    name: raspi-signage-virtual-vnc.service
    enabled: true
    state: started
  when:
    - raspi_signage_virtual_enabled
    - raspi_signage_virtual_vnc_enabled
    - raspi_signage_virtual_vnc_password_stat.stat.exists | default(false)
  become: true

- name: Ensure lightdm configuration directory exists
  ansible.builtin.file:
    path: /etc/lightdm/lightdm.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: raspi_signage_use_lightdm
  become: true

- name: Configure lightdm autologin (lightdm mode)
  ansible.builtin.template:
    src: lightdm-autologin.conf.j2
    dest: /etc/lightdm/lightdm.conf.d/50-raspi-signage.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart lightdm
  when: raspi_signage_use_lightdm
  become: true

- name: Ensure lightdm is enabled and running (lightdm mode)
  ansible.builtin.systemd:
    name: lightdm
    enabled: true
    state: started
  when: raspi_signage_use_lightdm
  become: true

- name: Disable signage service when using lightdm
  ansible.builtin.systemd:
    name: raspi-signage.service
    enabled: false
    state: stopped
  when: raspi_signage_use_lightdm
  become: true
  failed_when: false

- name: Deploy signage watchdog service
  ansible.builtin.template:
    src: raspi-signage-watchdog.service.j2
    dest: /etc/systemd/system/raspi-signage-watchdog.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when:
    - raspi_signage_watchdog_enabled
    - not raspi_signage_use_lightdm
  become: true

- name: Deploy signage watchdog timer
  ansible.builtin.template:
    src: raspi-signage-watchdog.timer.j2
    dest: /etc/systemd/system/raspi-signage-watchdog.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when:
    - raspi_signage_watchdog_enabled
    - not raspi_signage_use_lightdm
  become: true

- name: Enable and start signage watchdog timer
  ansible.builtin.systemd:
    name: raspi-signage-watchdog.timer
    enabled: true
    state: started
  when:
    - raspi_signage_watchdog_enabled
    - not raspi_signage_use_lightdm
  become: true

- name: Deploy nightly reboot service
  ansible.builtin.template:
    src: raspi-signage-reboot.service.j2
    dest: /etc/systemd/system/raspi-signage-reboot.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: raspi_signage_reboot_enabled
  become: true

- name: Deploy nightly reboot timer
  ansible.builtin.template:
    src: raspi-signage-reboot.timer.j2
    dest: /etc/systemd/system/raspi-signage-reboot.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: raspi_signage_reboot_enabled
  become: true

- name: Enable and start nightly reboot timer
  ansible.builtin.systemd:
    name: raspi-signage-reboot.timer
    enabled: true
    state: started
  when: raspi_signage_reboot_enabled
  become: true
