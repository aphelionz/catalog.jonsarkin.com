---
# Enable cockpit role for the host/group.
cockpit_enabled: false

# Packages to install for cockpit.
cockpit_packages:
  - cockpit

# Socket binding configuration.
# If cockpit_listen_streams is set, it is used verbatim. Otherwise, streams
# are derived from cockpit_listen_addresses + cockpit_listen_port.
cockpit_listen_addresses: []
cockpit_listen_port: 9090
cockpit_listen_streams: []

# Manage the systemd socket drop-in that controls ListenStream.
cockpit_manage_socket: true

# Drop-in filename under /etc/systemd/system/cockpit.socket.d/.
# Use override.conf to supersede any existing manual overrides.
cockpit_socket_dropin_name: override.conf

# Allow binding to a specific IP address even if it is not up yet.
cockpit_socket_freebind: true

# Stop cockpit.service when managing the socket, so cockpit-ws doesn't bind directly.
cockpit_stop_service_when_socket: true
