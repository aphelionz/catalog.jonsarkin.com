---
- name: Validate qdrant off-box mode
  ansible.builtin.assert:
    that:
      - qdrant_offbox_mode in ["none", "rsync", "rclone"]
    fail_msg: "qdrant_offbox_mode must be one of none|rsync|rclone"

- name: Ensure apt cache is up to date
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install qdrant backup packages
  ansible.builtin.apt:
    name:
      - curl
      - jq
    state: present
  become: true

- name: Install rsync for off-box backups
  ansible.builtin.apt:
    name: rsync
    state: present
  when: qdrant_offbox_mode == "rsync"
  become: true

- name: Install rclone for off-box backups
  ansible.builtin.apt:
    name: rclone
    state: present
  when: qdrant_offbox_mode == "rclone"
  become: true

- name: Ensure hyphae-backup group exists
  ansible.builtin.group:
    name: hyphae-backup
    system: true
    state: present
  become: true

- name: Ensure hyphae-backup user exists
  ansible.builtin.user:
    name: hyphae-backup
    group: hyphae-backup
    system: true
    home: /var/lib/hyphae-backup
    create_home: true
    shell: /usr/sbin/nologin
    state: present
  become: true

- name: Ensure qdrant backup root directory exists
  ansible.builtin.file:
    path: "{{ qdrant_backup_root }}"
    state: directory
    owner: hyphae-backup
    group: hyphae-backup
    mode: "0755"
  become: true

- name: Ensure qdrant backup collection directory exists
  ansible.builtin.file:
    path: "{{ qdrant_backup_root }}/{{ qdrant_collection }}"
    state: directory
    owner: hyphae-backup
    group: hyphae-backup
    mode: "0755"
  become: true

- name: Deploy qdrant snapshot backup script
  ansible.builtin.template:
    src: qdrant_backup.sh.j2
    dest: /usr/local/bin/qdrant_backup.sh
    owner: root
    group: root
    mode: "0755"
  notify: Restart qdrant-backup.timer
  become: true

- name: Deploy qdrant snapshot backup systemd service
  ansible.builtin.template:
    src: qdrant-backup.service.j2
    dest: /etc/systemd/system/qdrant-backup.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart qdrant-backup.timer
  become: true

- name: Deploy qdrant snapshot backup systemd timer
  ansible.builtin.template:
    src: qdrant-backup.timer.j2
    dest: /etc/systemd/system/qdrant-backup.timer
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart qdrant-backup.timer
  become: true

- name: Ensure qdrant backup timer is enabled and running
  ansible.builtin.systemd:
    name: qdrant-backup.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
