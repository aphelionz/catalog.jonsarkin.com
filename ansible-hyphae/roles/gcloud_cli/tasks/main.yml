---
- name: Ensure apt cache is up to date
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install google cloud apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  become: true

- name: Install google cloud apt keyring
  ansible.builtin.get_url:
    url: "{{ gcloud_cli_key_url }}"
    dest: "{{ gcloud_cli_keyring_path }}"
    mode: "0644"
  become: true

- name: Configure google cloud apt repository
  ansible.builtin.apt_repository:
    repo: "{{ gcloud_cli_repo }}"
    filename: google-cloud
    state: present
    update_cache: true
  become: true

- name: Install google cloud CLI packages
  ansible.builtin.apt:
    name: "{{ gcloud_cli_packages }}"
    state: present
  become: true
