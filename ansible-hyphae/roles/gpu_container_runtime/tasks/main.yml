---
- name: Fail if not Ubuntu
  ansible.builtin.assert:
    that:
      - ansible_facts.distribution | lower == "ubuntu"
    fail_msg: "gpu_container_runtime role currently supports Ubuntu only."

- name: Ensure prerequisite packages are installed
  ansible.builtin.apt:
    name: "{{ gpu_container_runtime_prereq_packages }}"
    state: present
  become: true

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Docker GPG key (ASCII)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  register: gpu_container_runtime_docker_gpg
  become: true

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ gpu_container_runtime_docker_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_facts.distribution_release }} stable
    state: present
  register: gpu_container_runtime_docker_repo
  become: true

- name: Update apt cache after adding Docker repo
  ansible.builtin.apt:
    update_cache: true
  when: gpu_container_runtime_docker_repo is defined and gpu_container_runtime_docker_repo.changed
  become: true

- name: Install Docker Engine packages
  ansible.builtin.apt:
    name: "{{ gpu_container_runtime_docker_packages }}"
    state: present
  become: true

- name: Determine NVIDIA container distribution identifier
  ansible.builtin.set_fact:
    gpu_container_runtime_nvidia_distribution: >-
      {{ gpu_container_runtime_nvidia_distribution_override
         if gpu_container_runtime_nvidia_distribution_override | length > 0
         else (gpu_container_runtime_nvidia_distribution_fallback
               if (ansible_facts.distribution | lower == 'ubuntu'
                   and (ansible_facts.distribution_major_version | int) >= 24)
               else ansible_facts.distribution | lower ~ ansible_facts.distribution_version) }}

- name: Ensure NVIDIA keyring directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download NVIDIA container toolkit GPG key (ASCII)
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /usr/share/keyrings/nvidia-container-toolkit.asc
    mode: "0644"
  register: gpu_container_runtime_nvidia_gpg
  become: true

- name: De-armor NVIDIA container toolkit GPG key
  ansible.builtin.command:
    cmd: gpg --batch --yes --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg /usr/share/keyrings/nvidia-container-toolkit.asc
  args:
    creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  environment:
    GNUPGHOME: /tmp
  when: gpu_container_runtime_nvidia_gpg.changed or not (ansible_facts.files | default({})).get('/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg', {})
  become: true

- name: Download NVIDIA container toolkit apt sources list
  ansible.builtin.get_url:
    url: "https://nvidia.github.io/libnvidia-container/{{ gpu_container_runtime_nvidia_distribution }}/libnvidia-container.list"
    dest: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    mode: "0644"
  register: gpu_container_runtime_nvidia_list
  become: true

- name: Ensure NVIDIA sources use signed-by
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    regexp: '^deb https://'
    replace: 'deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://'
  register: gpu_container_runtime_nvidia_replace
  become: true

- name: Update apt cache after adding NVIDIA repo
  ansible.builtin.apt:
    update_cache: true
  when: (gpu_container_runtime_nvidia_list is defined and gpu_container_runtime_nvidia_list.changed) or
        (gpu_container_runtime_nvidia_replace is defined and gpu_container_runtime_nvidia_replace.changed) or
        (gpu_container_runtime_nvidia_gpg is defined and gpu_container_runtime_nvidia_gpg.changed)
  become: true

- name: Install NVIDIA driver packages
  ansible.builtin.apt:
    name: "{{ gpu_container_runtime_driver_packages }}"
    state: present
  become: true

- name: Verify NVIDIA driver is loaded
  ansible.builtin.command:
    cmd: nvidia-smi
  register: gpu_container_runtime_driver_check
  changed_when: false
  failed_when: gpu_container_runtime_driver_check.rc != 0
  become: true

- name: Install NVIDIA container runtime packages
  ansible.builtin.apt:
    name:
      - nvidia-container-toolkit
      - nvidia-container-runtime
      - nvidia-docker2
    state: present
  become: true

- name: Configure Docker with NVIDIA default runtime
  ansible.builtin.command:
    cmd: nvidia-ctk runtime configure --runtime=docker --set-as-default --config=/etc/docker/daemon.json
  register: gpu_container_runtime_ctk_cfg
  changed_when: gpu_container_runtime_ctk_cfg.rc == 0
  failed_when: gpu_container_runtime_ctk_cfg.rc != 0
  notify: Restart Docker
  become: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: "{{ gpu_container_runtime_docker_service }}"
    state: started
    enabled: true
  become: true

- name: Check Docker swarm state
  ansible.builtin.command:
    cmd: "docker info --format '{{ '{{' }}.Swarm.LocalNodeState{{ '}}' }}'"
  register: gpu_container_runtime_swarm_state
  changed_when: false
  become: true

- name: Disable Docker swarm when requested
  ansible.builtin.command:
    cmd: >-
      docker swarm leave {{ '--force' if gpu_container_runtime_swarm_force_leave else '' }}
  register: gpu_container_runtime_swarm_leave
  changed_when: gpu_container_runtime_swarm_leave.rc == 0
  when:
    - not gpu_container_runtime_swarm_enabled
    - gpu_container_runtime_swarm_state.stdout | lower != 'inactive'
  become: true

- name: Ensure primary user in docker group
  ansible.builtin.user:
    name: "{{ base_primary_user | default('mark') }}"
    groups: docker
    append: true
  become: true

- name: Pull CUDA test image
  ansible.builtin.command:
    cmd: "docker pull {{ gpu_container_runtime_cuda_test_image }}"
  register: gpu_container_runtime_cuda_pull
  changed_when: "'Downloaded newer image' in gpu_container_runtime_cuda_pull.stdout or 'Pull complete' in gpu_container_runtime_cuda_pull.stdout"
  become: true

- name: Apply pending handler notifications (Docker restart)
  ansible.builtin.meta: flush_handlers

- name: Verify Docker has nvidia runtime configured
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - "{{ '{{json .Runtimes}}' }}"
  register: gpu_container_runtime_docker_runtimes
  changed_when: false
  failed_when: gpu_container_runtime_docker_runtimes.rc != 0 or ('nvidia' not in gpu_container_runtime_docker_runtimes.stdout)
  become: true

- name: Run GPU health check (nvidia-smi)
  ansible.builtin.command:
    cmd: "docker run --rm --runtime=nvidia --gpus all {{ gpu_container_runtime_cuda_test_image }} nvidia-smi"
  register: gpu_container_runtime_cuda_check
  changed_when: false
  failed_when: gpu_container_runtime_cuda_check.rc != 0 or ('NVIDIA-SMI' not in gpu_container_runtime_cuda_check.stdout)
  become: true
