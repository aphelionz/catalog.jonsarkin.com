---
- name: Hello World (Gather Facts Only)
  hosts: all
  gather_facts: true
  roles:
    - base
    - role: gcloud_cli
      when: inventory_hostname == "hyphae"
      tags:
        - backup
        - gcloud
    - role: qdrant_snapshot_backup
      when: inventory_hostname == "hyphae"
      tags:
        - backup
    - role: cockpit
      when: cockpit_enabled | default(false)
    - python_runtime
    - gpu_container_runtime
    - role: raspi_signage
      when: "'signage' in group_names"
  tasks: []
