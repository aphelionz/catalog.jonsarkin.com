---
- name: Raspberry Pi baseline setup
  hosts: signage
  become: true
  gather_facts: true

  vars:
    # Override these per-host if needed.
    pi_static_ip_address: "192.168.0.203/24"
    pi_static_interface: "{{ ansible_facts.get('default_ipv4', {}).get('interface', 'eth0') }}"
    pi_static_gateway: "{{ ansible_facts.get('default_ipv4', {}).get('gateway', '192.168.0.1') }}"
    pi_static_dns: "{{ ansible_facts.get('dns', {}).get('nameservers', [pi_static_gateway]) }}"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts.os_family == "Debian"

    - name: Install unattended-upgrades (if available)
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present
      when: ansible_facts.os_family == "Debian"

    - name: Enable unattended upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
      when: ansible_facts.os_family == "Debian"

    - name: Check for dhcpcd config
      ansible.builtin.stat:
        path: /etc/dhcpcd.conf
      register: dhcpcd_conf

    - name: Collect service facts
      ansible.builtin.service_facts:

    - name: Configure static IP via dhcpcd
      ansible.builtin.blockinfile:
        path: /etc/dhcpcd.conf
        marker: "# {mark} ANSIBLE MANAGED: static ip"
        block: |
          interface {{ pi_static_interface }}
          static ip_address={{ pi_static_ip_address }}
          static routers={{ pi_static_gateway }}
          static domain_name_servers={{ pi_static_dns | join(' ') }}
      when: dhcpcd_conf.stat.exists
      notify: Restart dhcpcd

    - name: Warn if dhcpcd is not present
      ansible.builtin.debug:
        msg: "dhcpcd.conf not found; static IP not configured. If using NetworkManager, add a connection profile instead."
      when: not dhcpcd_conf.stat.exists

  handlers:
    - name: Restart dhcpcd
      ansible.builtin.service:
        name: dhcpcd
        state: restarted
      when: "'dhcpcd.service' in ansible_facts.services or 'dhcpcd' in ansible_facts.services"
