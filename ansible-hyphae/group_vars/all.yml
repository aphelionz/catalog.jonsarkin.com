---
# Global site defaults

# System identity
base_hostname: "{{ inventory_hostname }}"
base_timezone: UTC

# Primary user and SSH access
base_primary_user: mark
base_primary_user_uid: 1000
base_primary_user_shell: /bin/bash
base_sshd_allow_users:
  - mark
base_sshd_listen_addresses:
  - 192.168.0.101
  - 10.10.0.1
base_sshd_address_family: inet

# Fishcity paths/logging
base_fishcity_root: /opt/fishcity
base_fishcity_owner: root
base_fishcity_group: root
base_fishcity_logrotate_frequency: daily
base_fishcity_logrotate_keep: 14
base_fishcity_logrotate_mode: "0640"

# Firewall
base_ufw_allow_tcp_ports:
  - 22
  - 80
  - 443

# WireGuard peers
base_wireguard_peers:
  - public_key: 9Z0+yDuehd+Feb4KRLsEh9d/y/ePkcpxEzc9JpJu40A=
    allowed_ips: 10.10.0.2/32

# GPU/Docker runtime
gpu_container_runtime_driver_packages:
  - nvidia-driver-535
gpu_container_runtime_cuda_test_image: nvidia/cuda:12.4.1-base-ubuntu22.04
# NVIDIA has not published a 24.04 repo yet; pin to 22.04 repo path for now.
gpu_container_runtime_nvidia_distribution_override: ubuntu22.04
