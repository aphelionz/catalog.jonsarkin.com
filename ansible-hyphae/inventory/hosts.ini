[fishcity]
hyphae ansible_host=10.10.0.1
hyphae ansible_user=mark
hyphae ansible_ssh_private_key_file=~/.ssh/id_ed25519
hyphae ansible_python_interpreter=/usr/bin/python3

[signage]
gallery_signage_1 ansible_host=192.168.0.203
gallery_signage_1 ansible_user=mark
gallery_signage_1 ansible_ssh_common_args='-o ProxyJump="mark@hyphae"'
gallery_signage_1 ansible_python_interpreter=/usr/bin/python3
