services:
  db:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: omeka
      MARIADB_USER: omeka
      MARIADB_PASSWORD: omeka
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect"]
      interval: 3s
      retries: 30

  omeka:
    image: giocomai/omeka-s-docker:v4.2.0
    ports:
      - "8888:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./omeka/volume:/var/www/html/volume
      - ./omeka/php-uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ./omeka/apache-expires.load:/etc/apache2/mods-enabled/expires.load:ro
      - ./omeka/apache-headers.load:/etc/apache2/mods-enabled/headers.load:ro
      - ./omeka/apache-caching.conf:/etc/apache2/conf-enabled/caching.conf:ro
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: omeka
      MYSQL_USER: omeka
      MYSQL_PASSWORD: omeka
      OMEKA_ADMIN_EMAIL: admin@example.com
      OMEKA_ADMIN_PASSWORD: admin-admin
      OMEKA_SITE_TITLE: "Jon Sarkin Catalog"
      OMEKA_ENVIRONMENT: development
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    restart: on-failure:5

  qdrant:
    image: qdrant/qdrant:v1.16
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  clip-api:
    build:
      context: ./sarkin-clip
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: omeka_items
      VECTOR_NAME: visual_vec
      TEXT_VECTOR_NAME: text_vec_clip
      SEARCH_MODE: hybrid
      DEFAULT_LIMIT: 50
      DINO_COLLECTION: sarkin_motif_patches_518
      DINO_ENABLED: "true"
      SEGMENT_COLLECTION: sarkin_motif_segments
      SEGMENT_ENABLED: "true"
      SEGMENT_INGEST_ENABLED: "true"
      SEGMENT_DIR: /app/segments
    volumes:
      - segment_data:/app/segments
      - ./sarkin-clip/clip_api:/app/clip_api
    restart: unless-stopped

  ingest:
    build:
      context: ./sarkin-clip
      dockerfile: Dockerfile.cpu
    depends_on:
      - qdrant
    environment:
      OMEKA_BASE_URL: http://omeka:80
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: omeka_items
      INGEST_WORKERS: 3
    volumes:
      - ./sarkin-clip/.hf_cache:/app/.hf_cache
    profiles:
      - ingest

volumes:
  dbdata:
  qdrant_data:
  segment_data:
