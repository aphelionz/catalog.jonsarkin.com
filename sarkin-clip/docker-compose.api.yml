version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  clip-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: clip-api
    restart: unless-stopped
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=omeka_items
      - VECTOR_NAME=visual_vec
      - DEFAULT_LIMIT=50
      - SEARCH_DB_PATH=/app/search_index/index.sqlite
      - SEARCH_MODE=hybrid
      # - QDRANT_API_KEY=...
      # - DEFAULT_SCORE_THRESHOLD=0.2
    ports:
      - "8000:8000"
    volumes:
      - search_index:/app/search_index
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
  search_index:
