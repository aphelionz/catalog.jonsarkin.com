version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omeka-ingest
    restart: "no"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OMEKA_TEMPLATE_ID=${OMEKA_TEMPLATE_ID:-2}
      - INGEST_WORKERS=${INGEST_WORKERS:-3}
      - FORCE_OCR=${FORCE_OCR:-1}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=omeka_items
      - SEARCH_DB_PATH=/app/search_index/index.sqlite
    volumes:
      - ./.hf_cache:/app/.hf_cache
      - ./.ocr_cache.json:/app/.ocr_cache.json
      - search_index:/app/search_index
    depends_on:
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  clip-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: clip-api
    restart: unless-stopped
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=omeka_items
      - VECTOR_NAME=visual_vec
      - DEFAULT_LIMIT=50
      - SEARCH_DB_PATH=/app/search_index/index.sqlite
      - SEARCH_MODE=hybrid
      # - QDRANT_API_KEY=...
      # - DEFAULT_SCORE_THRESHOLD=0.2
    ports:
      - "8000:8000"
    volumes:
      - search_index:/app/search_index
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
  search_index:
