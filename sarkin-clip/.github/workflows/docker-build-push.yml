name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

env:
  REGISTRY: docker.io
  IMAGE_NAME: aphelionz/sarkin-clip-indexer
  TAG: latest

jobs:
  build-gpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: aphelionz
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push (GPU, linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          cache-from: type=gha,scope=clip-gpu
          cache-to: type=gha,scope=clip-gpu,mode=max

  build-cpu:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: aphelionz
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push (CPU, linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cpu-${{ env.TAG }}
          cache-from: type=gha,scope=clip-cpu
          cache-to: type=gha,scope=clip-cpu,mode=max
