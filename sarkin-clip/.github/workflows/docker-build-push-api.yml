name: Build and Push clip-api Image

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

env:
  REGISTRY: docker.io
  IMAGE_NAME: aphelionz/sarkin-clip-api
  TAG: latest

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: aphelionz
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push (clip-api, linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          cache-from: type=gha,scope=clip-api
          cache-to: type=gha,scope=clip-api,mode=max
