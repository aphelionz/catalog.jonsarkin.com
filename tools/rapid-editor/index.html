<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapid Editor — Sarkin Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Nav bar ──────────────────────────────────────────────────────── -->
  <nav id="nav">
    <div class="nav-left">
      <span id="queue-status">Loading…</span>
    </div>
    <div class="nav-center">
      <a id="item-link" href="#" target="_blank" title="Open in Omeka admin"></a>
    </div>
    <div class="nav-right">
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="issues">Issues <span id="count-issues"></span></button>
        <button class="filter-btn" data-filter="dates">Dates <span id="count-dates"></span></button>
        <button class="filter-btn" data-filter="all">All <span id="count-all"></span></button>
        <button class="filter-btn" data-filter="box">By Box</button>
        <button class="filter-btn" data-filter="curate">Curate</button>
      </div>
      <select id="box-select" class="hidden">
        <option value="">Select box…</option>
      </select>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </nav>

  <!-- ── Loading overlay ──────────────────────────────────────────────── -->
  <div id="loading">
    <div class="loading-inner">
      <div class="spinner"></div>
      <p id="loading-text">Loading catalog items…</p>
    </div>
  </div>

  <!-- ── Main layout ──────────────────────────────────────────────────── -->
  <main id="main" class="hidden">

    <!-- Image panel -->
    <section id="image-panel">
      <img id="item-image" alt="Artwork image">
      <div id="image-loading" class="hidden">Loading image…</div>
    </section>

    <!-- Form panel -->
    <section id="form-panel">
      <div id="issue-badges"></div>

      <form id="editor-form" autocomplete="off">
        <!-- Focused fields -->
        <label>Date</label>
        <div id="date-pills" class="date-pills" data-term="dcterms:date"></div>
        <input type="text" id="f-date" data-term="dcterms:date" placeholder="Custom date (e.g. c. 2005)">

        <label for="f-type">Type</label>
        <select id="f-type" data-term="dcterms:type">
          <option value="">—</option>
        </select>

        <label for="f-medium">Medium</label>
        <input type="text" id="f-medium" data-term="dcterms:medium" placeholder="e.g. Marker on paper">

        <div class="row-2">
          <div>
            <label for="f-support">Support</label>
            <select id="f-support" data-term="schema:artworkSurface">
              <option value="">—</option>
            </select>
          </div>
          <div>
            <label for="f-condition">Condition</label>
            <select id="f-condition" data-term="schema:itemCondition">
              <option value="">—</option>
            </select>
          </div>
        </div>

        <div class="row-2">
          <div>
            <label for="f-height">Height ″</label>
            <input type="text" id="f-height" data-term="schema:height" placeholder="in.">
          </div>
          <div>
            <label for="f-width">Width ″</label>
            <input type="text" id="f-width" data-term="schema:width" placeholder="in.">
          </div>
        </div>

        <label>Signature</label>
        <div id="sig-grid" class="sig-grid" data-term="schema:distinguishingSign">
          <button type="button" data-val="↖">↖</button>
          <button type="button" data-val="↑">↑</button>
          <button type="button" data-val="↗">↗</button>
          <button type="button" data-val="←">←</button>
          <button type="button" data-val="∅" title="None">∅</button>
          <button type="button" data-val="→">→</button>
          <button type="button" data-val="↙">↙</button>
          <button type="button" data-val="↓">↓</button>
          <button type="button" data-val="↘">↘</button>
        </div>

        <label>Motifs</label>
        <div id="motif-chips" class="chip-group" data-term="dcterms:subject"></div>

        <label>Transcription</label>
        <div id="transcription-pills" class="transcription-pills"></div>

        <!-- Collapsible "More" section -->
        <details id="more-fields">
          <summary>More fields</summary>

          <label for="f-identifier">Identifier</label>
          <input type="text" id="f-identifier" data-term="dcterms:identifier">

          <label for="f-description">Description</label>
          <textarea id="f-description" data-term="dcterms:description" rows="2"></textarea>

          <label for="f-framing">Framing</label>
          <input type="text" id="f-framing" data-term="dcterms:format">

          <label for="f-owner">Owner</label>
          <input type="text" id="f-owner" data-term="bibo:owner">

          <label for="f-location">Location</label>
          <input type="text" id="f-location" data-term="dcterms:spatial">

          <label for="f-provenance">Provenance</label>
          <textarea id="f-provenance" data-term="dcterms:provenance" rows="2"></textarea>

          <label for="f-rights">Rights</label>
          <input type="text" id="f-rights" data-term="dcterms:rights">

          <label for="f-credit">Credit</label>
          <input type="text" id="f-credit" data-term="schema:creditText">

          <label for="f-inscriptions">Inscriptions</label>
          <textarea id="f-inscriptions" data-term="bibo:annotates" rows="2"></textarea>

          <label for="f-transcription">Transcription</label>
          <textarea id="f-transcription" data-term="bibo:content" rows="4"></textarea>

          <label for="f-exhibition">Exhibition</label>
          <input type="text" id="f-exhibition" data-term="bibo:presentedAt">

          <label for="f-bibliography">Bibliography</label>
          <input type="text" id="f-bibliography" data-term="dcterms:bibliographicCitation">

          <label for="f-box">Box</label>
          <input type="text" id="f-box" data-term="schema:box">

          <label for="f-notes">Curator notes</label>
          <textarea id="f-notes" data-term="curation:note" rows="2"></textarea>
        </details>

        <!-- Actions -->
        <div class="actions">
          <button type="button" id="btn-prev" class="btn btn-nav" title="Ctrl+←">← Prev</button>
          <button type="button" id="btn-save" class="btn btn-save" title="Ctrl+S">Save</button>
          <button type="button" id="btn-skip" class="btn btn-skip" title="Esc">Skip →</button>
          <button type="button" id="btn-save-next" class="btn btn-save-next" title="Ctrl+→">Save + Next →</button>
        </div>
      </form>
    </section>
  </main>

  <!-- ── Curate mode ────────────────────────────────────────────────── -->
  <section id="curate-panel" class="hidden">
    <div id="curate-progress">
      <span id="curate-count"></span>
      <button id="curate-undo" class="btn btn-nav" disabled>Undo</button>
    </div>
    <div id="card-stage"></div>
    <div id="curate-actions">
      <button id="curate-pass" class="btn curate-btn-pass" title="← or swipe left">← Pass</button>
      <button id="curate-keep" class="btn curate-btn-keep" title="→ or swipe right">Keep →</button>
    </div>
  </section>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <script src="editor.js"></script>
</body>
</html>
