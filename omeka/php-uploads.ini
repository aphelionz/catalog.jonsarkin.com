; Upload limits for SimpleUpload
upload_max_filesize = 512M
post_max_size = 768M
max_file_uploads = 100
max_execution_time = 600
max_input_time = 600
memory_limit = 1024M

; Disable PHP's default session cache headers (no-store, pragma: no-cache).
; Caching is handled by Apache config instead, with different rules for
; public pages (allow bfcache) vs admin pages (no-store).
session.cache_limiter =
