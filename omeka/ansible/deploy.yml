---
- name: Deploy Omeka volume to VPS
  hosts: omeka
  gather_facts: true
  vars:
    prod_dir: /opt/catalog
    volume_src: "{{ playbook_dir }}/../volume/"
    deploy_delete: false
  tasks:
    - name: Sync ./volume into prod Omeka volume (excluding uploads)
      synchronize:
        src: "{{ volume_src }}"
        dest: "{{ prod_dir }}/omeka/volume/"
        mode: push
        delete: "{{ deploy_delete }}"
        compress: true
        recursive: true
        perms: false
        owner: false
        group: false
        rsync_opts:
          - "--omit-dir-times"
          - "--exclude=files/"
          - "--exclude=/config/"

    - name: Restart Omeka container
      command: docker compose restart omeka
      args:
        chdir: "{{ prod_dir }}"
