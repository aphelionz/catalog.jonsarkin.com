[info]
name = "Sarkin-Jeppesen"
version = "0.1.0"
author = "The Jon Sarkin Catalog"
description = "A Jeppesen manual-inspired theme for the Jon Sarkin Catalog Raisonne. Dense, structured, institutional."
license = "MIT"
omeka_version_constraint = "^4.0.0"

[config]
elements.footer_text.name = "footer_text"
elements.footer_text.type = "Textarea"
elements.footer_text.options.label = "Footer Text"
elements.footer_text.attributes.value = "The Jon Sarkin Estate / Artists Rights Society (ARS), New York. All rights reserved."

elements.browse_layout.name = "browse_layout"
elements.browse_layout.type = "Radio"
elements.browse_layout.options.label = "Browse Layout"
elements.browse_layout.options.value_options.grid = "Grid"
elements.browse_layout.options.value_options.list = "List"
elements.browse_layout.attributes.value = "grid"

resource_page_regions.items.main = "Main"
